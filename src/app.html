<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <title>Stip&Flip</title>
    <meta
      name="description"
      content="Decentralised exchange and synthetic platform"
    />

    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta charset="utf-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
      sizes="180x180"
    />
    <link rel="mask-icon" href="/icon.svg" color="#ffffff" />
    <meta name="theme-color" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&family=Padauk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
    <script>
      function setViewportHeight() {
        const vh = (window.innerHeight - 30) * 0.01;
        document.documentElement.style.setProperty("--vh", `${vh}px`);
      }

      // window.addEventListener("resize", setViewportHeight);
      // window.addEventListener("orientationchange", setViewportHeight);
      document.addEventListener("DOMContentLoaded", setViewportHeight);
    </script>
  </head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Ensure the background covers the entire viewport */
      background-size: cover;
      background-attachment: fixed;
    }
    body {
      /* Apply padding for safe areas */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  </style>
  <body data-sveltekit-preload-data="hover" class="bg-2 overflow-x-hidden">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
